<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | 설교 산출물</title>
<style>
  :root{
    --page-bg:#f2f3f5;
    --card-bg:#ffffff;
    --border:#eceef1;
    --text:#1a1c1f;
    --text-2:#6b7280;
    --text-3:#9aa1ab;
    --badge-bg:#eef0ff;
    --badge-text:#5b57e0;
  }
  [data-theme="dark"]{
    --page-bg:#131417;
    --card-bg:#1d1f23;
    --border:#2c2f34;
    --text:#f2f3f5;
    --text-2:#a7adb6;
    --text-3:#7d838d;
    --badge-bg:#2a2860;
    --badge-text:#b3aeff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 16px;
    background:var(--page-bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    line-height:1.6;
  }
  .card{
    width:100%;
    max-width:460px;
    background:var(--card-bg);
    border-radius:28px;
    padding:28px 24px 32px;
    box-shadow:0 12px 40px rgba(20,20,30,0.08);
    position:relative;
  }
  .theme-toggle{
    position:absolute;top:20px;right:20px;
    border:1px solid var(--border);background:transparent;color:var(--text-2);
    border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;
  }
  .badge{
    display:inline-block;font-size:13px;font-weight:700;color:var(--badge-text);
    background:var(--badge-bg);padding:6px 14px;border-radius:999px;margin-bottom:14px;
  }
  h1{font-size:23px;font-weight:800;line-height:1.35;margin:0 0 6px;letter-spacing:-0.01em;}
  .scripture{font-size:14px;color:var(--text-2);margin:0;}
  .section-title{
    display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    margin:28px 0 12px;
  }
  .section-title span.label{font-size:15px;font-weight:700;}
  .section-title span.hint{font-size:12px;color:var(--text-3);flex-shrink:0;}
  .infographic-img{
    display:block;width:100%;border-radius:16px;border:1px solid var(--border);cursor:pointer;
  }
  .empty-state{
    background:var(--page-bg);border:1px dashed var(--border);border-radius:16px;
    padding:20px;text-align:center;color:var(--text-3);font-size:13px;
  }
  .divider{border:0;border-top:1px solid var(--border);margin:30px 0;}
  .output-list{display:flex;flex-direction:column;gap:10px;}
  a.output-btn,details.output-btn summary{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    border-radius:16px;padding:16px 18px;font-weight:700;font-size:15px;
    text-decoration:none;cursor:pointer;list-style:none;
  }
  details.output-btn summary::-webkit-details-marker{display:none;}
  a.output-btn .open,details.output-btn summary .open{font-size:13px;font-weight:600;opacity:0.85;flex-shrink:0;}
  details.output-btn .accordion-body{
    padding:4px 18px 18px;font-size:14px;color:var(--text);
  }
  details.output-btn .accordion-body p{margin:0 0 10px;}
  details.output-btn .accordion-body ul,details.output-btn .accordion-body ol{margin:0 0 10px;padding-left:20px;}
  details.output-btn .accordion-body h3{font-size:13px;margin:14px 0 6px;opacity:0.75;}
  .output-btn.is-empty{opacity:0.55;cursor:default;}
  .output-btn.is-empty .open{opacity:0.6;}
  .accent-summary{background:#eaf0ff;color:#3457d5;}
  .accent-slides{background:#f1eeff;color:#6c4fd8;}
  .accent-video{background:#ffedf1;color:#d43d6c;}
  .accent-audio{background:#f5edff;color:#8b3fd8;}
  .accent-qt{background:#e7f9ee;color:#159a52;}
  .accent-study{background:#fff8e1;color:#b8860b;}
  [data-theme="dark"] .accent-summary{background:#1e2747;color:#9db3ff;}
  [data-theme="dark"] .accent-slides{background:#241f42;color:#c3b3ff;}
  [data-theme="dark"] .accent-video{background:#3a1c26;color:#ff9ab7;}
  [data-theme="dark"] .accent-audio{background:#2c1f42;color:#d3aeff;}
  [data-theme="dark"] .accent-qt{background:#123322;color:#7bd9a4;}
  [data-theme="dark"] .accent-study{background:#3a2f0f;color:#f0cf6e;}
  footer{text-align:center;padding-top:28px;font-size:11px;color:var(--text-3);}
  @media (max-width:480px){
    .card{padding:24px 18px 28px;border-radius:22px;}
    h1{font-size:20px;}
  }

  /* 일반 버튼 태그 스타일 호환성 */
  button.output-btn {
    display: flex !important;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-radius: 16px;
    padding: 16px 18px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  button.output-btn .open {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.85;
    flex-shrink: 0;
  }

  /* 설교 문서 읽기 모달 스타일 */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.3);
    backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .modal-content {
    background: #fafaf9;
    width: 100%;
    max-width: 768px;
    height: 90vh;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(15, 23, 42, 0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    border: 1px solid #e7e5e4;
  }
  [data-theme="dark"] .modal-content {
    background: #1c1917;
    border-color: #44403c;
  }
  .modal-header {
    background: #ffffff;
    border-bottom: 1px solid #e7e5e4;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  [data-theme="dark"] .modal-header {
    background: #1c1917;
    border-bottom-color: #44403c;
  }
  .modal-header-inner {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-header-tag {
    font-size: 14px;
    font-weight: 700;
    color: #4f46e5;
    letter-spacing: 0.05em;
  }
  [data-theme="dark"] .modal-header-tag {
    color: #818cf8;
  }
  .modal-header-scripture {
    font-size: 12px;
    color: var(--text-3);
  }
  .modal-close-btn {
    background: transparent;
    border: none;
    font-size: 28px;
    font-weight: 300;
    cursor: pointer;
    color: var(--text-2);
    line-height: 1;
  }
  .modal-close-btn:hover {
    color: var(--text);
  }
  .modal-body-wrapper {
    padding: 0;
    overflow-y: auto;
    flex: 1;
  }
  .modal-body-inner {
    max-width: 768px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }
  .modal-main-title {
    text-align: center;
    margin-bottom: 64px;
  }
  .modal-main-title h1 {
    font-size: 32px;
    font-weight: 800;
    color: #0f172a;
    line-height: 1.25;
    margin-bottom: 16px;
    letter-spacing: -0.025em;
  }
  [data-theme="dark"] .modal-main-title h1 {
    color: #f1f5f9;
  }
  .modal-main-title .subtitle {
    font-size: 18px;
    color: #4f46e5;
    font-weight: 600;
    margin: 0;
  }
  [data-theme="dark"] .modal-main-title .subtitle {
    color: #818cf8;
  }
  .title-divider {
    width: 64px;
    height: 4px;
    background: #6366f1;
    margin: 24px auto 0;
    border-radius: 99px;
  }
  [data-theme="dark"] .title-divider {
    background: #818cf8;
  }

  /* 본문 콘텐츠 스타일 */
  .modal-body-content {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    word-break: keep-all; 
    overflow-wrap: break-word;
    font-size: 17px;
    line-height: 1.75;
    color: #334155;
  }
  [data-theme="dark"] .modal-body-content {
    color: #cbd5e1;
  }
  
  /* 대지 제목 (###) */
  .modal-body-content h3 {
    font-size: 24px;
    font-weight: 700;
    color: #0f172a;
    margin-top: 48px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-left: none !important;
    padding-left: 0 !important;
  }
  [data-theme="dark"] .modal-body-content h3 {
    color: #f1f5f9;
  }
  .modal-body-content h3 .number {
    color: #6366f1;
  }
  [data-theme="dark"] .modal-body-content h3 .number {
    color: #818cf8;
  }

  /* 성경구절 blockquote */
  .modal-body-content blockquote {
    background: #f5f5f4;
    border-left: 4px solid #818cf8;
    border-radius: 0 8px 8px 0;
    padding: 16px;
    margin: 20px 0 24px;
    color: #1e293b;
    position: relative;
  }
  [data-theme="dark"] .modal-body-content blockquote {
    background: #292524;
    border-left-color: #6366f1;
    color: #e2e8f0;
  }
  .modal-body-content blockquote p {
    margin: 0;
    font-weight: 600;
  }
  .modal-body-content blockquote p span.ref {
    font-size: 13px;
    font-weight: 400;
    color: #64748b;
    margin-left: 6px;
  }
  
  /* 형광펜 그라데이션 하이라이트 */
  .modal-body-content .highlight {
    background: linear-gradient(180deg, rgba(255,255,255,0) 50%, #fef08a 50%);
    font-weight: 600;
    color: #0f172a;
    padding: 0 4px;
  }
  [data-theme="dark"] .modal-body-content .highlight {
    background: linear-gradient(180deg, rgba(255,255,255,0) 50%, #854d0e 50%);
    color: #ffffff;
  }

  /* 결론 박스 및 체크리스트 */
  .modal-body-content .conclusion-box {
    background: #ffffff;
    border: 1px solid #e7e5e4;
    border-radius: 12px;
    box-shadow: 0 1px 3px 0 rgba(0,0,0,0.05);
    padding: 24px;
    margin-top: 40px;
  }
  [data-theme="dark"] .modal-body-content .conclusion-box {
    background: #1c1917;
    border-color: #44403c;
  }
  .modal-body-content .conclusion-box h3 {
    font-size: 20px;
    font-weight: 700;
    justify-content: center;
    margin-top: 0;
    margin-bottom: 16px;
    border: none;
    padding: 0;
  }
  .modal-body-content .conclusion-list {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .modal-body-content .conclusion-list li {
    display: flex;
    align-items: start;
    gap: 8px;
    margin-bottom: 12px;
  }
  .modal-body-content .conclusion-list li:last-child {
    margin-bottom: 0;
  }
  .modal-body-content .conclusion-list li svg {
    color: #6366f1;
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }
  
  /* 기도문 카드 */
  .modal-body-content .prayer-box {
    background: #f5f3ff;
    border: 1px solid #e0e7ff;
    border-radius: 12px;
    box-shadow: 0 1px 3px 0 rgba(0,0,0,0.05);
    padding: 24px;
    margin-top: 40px;
    text-align: center;
    color: #312e81;
  }
  [data-theme="dark"] .modal-body-content .prayer-box {
    background: #1e1b4b;
    border-color: #312e81;
    color: #c7d2fe;
  }
  .modal-body-content .prayer-box h3 {
    font-size: 20px;
    font-weight: 700;
    color: #312e81;
    justify-content: center;
    margin-top: 0;
    margin-bottom: 16px;
  }
  [data-theme="dark"] .modal-body-content .prayer-box h3 {
    color: #c7d2fe;
  }
  .modal-body-content .prayer-box p {
    font-style: italic;
    line-height: 1.625;
    margin: 0;
    color: #3730a3;
  }
  [data-theme="dark"] .modal-body-content .prayer-box p {
    color: #e0e7ff;
  }
</style>
</head>
<body>

<div class="card">
  <button class="theme-toggle" onclick="document.documentElement.toggleAttribute('data-theme')">다크모드</button>

  <span class="badge">{{SERIES}}</span>
  <h1>{{TITLE}}</h1>
  <p class="scripture">{{SCRIPTURE}} · {{DATE}}</p>

  <div class="section-title">
    <span class="label">🎨 말씀 인포그래픽</span>
    <span class="hint">클릭하여 확대</span>
  </div>
  <!--INFOGRAPHIC_CONTENT--><!--/INFOGRAPHIC_CONTENT-->

  <hr class="divider">

  <div class="section-title">
    <span class="label">📁 관련 자료 모음</span>
  </div>
  <div class="output-list">
    <!--OUTPUT_LIST--><!--/OUTPUT_LIST-->
  </div>

  <footer>Sermon Multiplier로 생성됨 · 원본 노트: {{NOTE_FILENAME}} · 생성 시각: {{GENERATED_AT}}</footer>
</div>

<!-- 설교 문서 읽기 모달 -->
<div id="word-modal" class="modal-overlay">
  <div class="modal-content animate-fade-in">
    <!-- Header Section -->
    <div class="modal-header">
      <div class="modal-header-inner">
        <span class="modal-header-tag">말씀묵상</span>
        <span class="modal-header-scripture">{{SCRIPTURE}}</span>
      </div>
      <button class="modal-close-btn" onclick="closeWordModal()">&times;</button>
    </div>
    
    <!-- Scrollable Body -->
    <div class="modal-body-wrapper">
      <div class="modal-body-inner">
        <!-- Title Area -->
        <div class="modal-main-title">
          <h1>{{TITLE}}</h1>
          <p class="subtitle">{{SCRIPTURE}}</p>
          <div class="title-divider"></div>
        </div>
        
        <!-- Rendered Content -->
        <div id="modal-body-content" class="modal-body-content">
          <!-- 동적 삽입 -->
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function openWordModal(htmlContent) {
    const modal = document.getElementById('word-modal');
    const bodyContent = document.getElementById('modal-body-content');
    bodyContent.innerHTML = htmlContent;
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function closeWordModal() {
    const modal = document.getElementById('word-modal');
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }
  window.addEventListener('click', (e) => {
    const modal = document.getElementById('word-modal');
    if (e.target === modal) {
      closeWordModal();
    }
  });
</script>

</body>
</html>
